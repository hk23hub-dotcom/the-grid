name: grid-agent

# Corre solo cada 6h y queda verde, pero NO sobreescribe grid.json
# (la grilla está curada a mano). Cuando los proyectos sean repos reales,
# se reactiva el commit automático.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh-grid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run the grid agent (read-only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: hk23hub-dotcom
        run: node scripts/grid-agent.mjs
