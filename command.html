<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HK23 — GRID COMMAND CENTER</title>
<style>
  :root{
    --bg:#08080a; --panel:#101014; --panel2:#15151b; --line:#1d1d22; --line2:#2a2a33;
    --ink:#f4f4f5; --mut:#8a8a92; --mut2:#5d5d66; --gold:#d4af37; --goldbg:#2a2410;
    --live:#3ecf8e; --local:#d4af37; --building:#e0b341; --down:#ef5b5b; --blue:#5b9cf0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  button{font:inherit;cursor:pointer;color:inherit;background:none;border:none}
  input,textarea,select{font:inherit;color:var(--ink);background:var(--panel2);border:1px solid var(--line2);
    border-radius:9px;padding:9px 11px;width:100%;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--gold)}
  textarea{resize:vertical;min-height:60px}
  .wrap{max-width:1240px;margin:0 auto;padding:26px 20px 90px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .brand{font-weight:800;letter-spacing:-.01em;font-size:24px}
  .brand small{display:block;letter-spacing:.3em;font-size:10px;color:var(--mut);font-weight:600}
  .creed{color:var(--gold);letter-spacing:.16em;font-size:11px;font-weight:700}
  .sync{color:var(--mut);font-size:12px}
  .sync b{color:var(--live)}
  nav{display:flex;gap:6px;margin:22px 0 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:10px 16px;color:var(--mut);font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--ink);border-color:var(--gold)}
  .tab .n{display:inline-block;min-width:18px;text-align:center;font-size:11px;color:var(--bg);
    background:var(--mut);border-radius:999px;padding:1px 6px;margin-left:6px}
  .tab.on .n{background:var(--gold)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .kpi .v{font-size:28px;font-weight:800}
  .kpi .l{color:var(--mut);font-size:12px;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
  .kpi .v.live{color:var(--live)} .kpi .v.local{color:var(--gold)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .card .shot{aspect-ratio:16/9;object-fit:cover;width:100%;background:#0d0d10}
  .card .b{padding:13px 14px}
  .card .nm{font-weight:700;font-size:14.5px}
  .card .ds{color:var(--mut);font-size:12.5px;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .ft{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
  .badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--line2);color:var(--mut)}
  .badge.live{color:var(--live);border-color:#1c3b2e} .badge.local{color:var(--gold);border-color:#3a3014}
  .badge.building{color:var(--building);border-color:#3a3014} .badge.down{color:var(--down);border-color:#3a1c1c}
  .mini{font-size:11.5px;color:var(--mut2)}
  .noteln{font-size:11.5px;color:var(--blue);margin-top:8px;cursor:pointer}
  .noteln:hover{text-decoration:underline}
  .sh{display:flex;justify-content:space-between;align-items:center;margin:0 0 16px;gap:12px;flex-wrap:wrap}
  .sh h2{font-size:18px;margin:0}
  .btn{background:var(--gold);color:#1a1405;font-weight:700;border-radius:9px;padding:9px 15px;font-size:13px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink);font-weight:600}
  .btn.ghost:hover{border-color:var(--gold)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:10px}
  .row.done{opacity:.5}
  .row .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .row .ttl{font-weight:700}
  .row .meta{color:var(--mut);font-size:12px;margin-top:3px}
  .row .body{color:#cdcdd3;font-size:13.5px;margin-top:8px;white-space:pre-wrap}
  .count{font-variant-numeric:tabular-nums;font-weight:700}
  .count.soon{color:var(--building)} .count.over{color:var(--down)} .count.future{color:var(--live)}
  .acts{display:flex;gap:6px;flex-shrink:0}
  .x{color:var(--mut2);font-size:13px} .x:hover{color:var(--down)}
  .form{background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:16px;margin-bottom:20px;display:none}
  .form.open{display:block}
  .form .g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .form label{font-size:11px;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:4px}
  .form .full{grid-column:1/-1}
  .right{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:900px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.board{grid-template-columns:1fr}}
  .col{background:#0c0c10;border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
  .col h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:4px 4px 10px;display:flex;justify-content:space-between}
  .idea{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:11px 12px;margin-bottom:9px;cursor:grab}
  .idea:active{cursor:grabbing}
  .idea .it{font-weight:700;font-size:13.5px}
  .idea .ib{color:var(--mut);font-size:12px;margin-top:4px;white-space:pre-wrap}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .tag{font-size:10px;color:var(--gold);border:1px solid #3a3014;border-radius:999px;padding:2px 7px}
  .link{font-size:11px;color:var(--blue);margin-top:7px;display:block}
  .idea .mv{display:flex;gap:4px;margin-top:9px;color:var(--mut2);font-size:11px}
  .idea .mv button:hover{color:var(--gold)}
  .empty{color:var(--mut2);font-size:12.5px;text-align:center;padding:20px}
  .hide{display:none!important}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:20px;max-width:440px;width:100%}
  .sheet h3{margin:0 0 14px}
  .stylewrap{display:flex;gap:18px;flex-wrap:wrap}
  .stylecol{min-width:240px}.stylecol.grow{flex:1;min-width:300px}
  .styleblock{margin-bottom:16px}
  .styleblock label,.stylecol>label{font-size:11px;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:7px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line2);background:var(--panel);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--gold)}
  .chip.on{border-color:var(--gold);background:var(--goldbg)}
  .chip .sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,.15)}
  .stylenote{font-size:12px;color:var(--live);margin-top:6px;min-height:16px}
  .sp{border:1px solid var(--line2);border-radius:14px;padding:14px;background:var(--bg,#08080a)}
  [data-skin="vice-gold"]{--pbg:#08080a;--ppanel:#101014;--pline:#1d1d22;--pink:#f4f4f5;--pmut:#8a8a92;--pacc:#d4af37}
  [data-skin="neon"]{--pbg:#05060a;--ppanel:#0b0e16;--pline:#16202e;--pink:#eaf6ff;--pmut:#7d93ad;--pacc:#00e5ff}
  [data-skin="mono"]{--pbg:#000;--ppanel:#0c0c0c;--pline:#242424;--pink:#fff;--pmut:#9a9a9a;--pacc:#fff}
  [data-skin="light"]{--pbg:#faf9f7;--ppanel:#fff;--pline:#e7e4dd;--pink:#18181b;--pmut:#6b6b73;--pacc:#a9801a}
  [data-skin="blood"]{--pbg:#0a0606;--ppanel:#150c0c;--pline:#2a1414;--pink:#f6ecec;--pmut:#a98a8a;--pacc:#ff3b3b}
  [data-skin="cyber"]{--pbg:#050a06;--ppanel:#0a140a;--pline:#15301a;--pink:#d8ffe0;--pmut:#6fae7f;--pacc:#39ff14}
  .sp{background:var(--pbg)}
  .spgrid{display:grid;gap:10px;grid-template-columns:repeat(2,1fr)}
  .sp[data-layout="compact"] .spgrid{grid-template-columns:repeat(3,1fr)}
  .sp[data-layout="list"] .spgrid{grid-template-columns:1fr}
  .sp[data-layout="list"] .spcard{flex-direction:row}
  .sp[data-layout="list"] .spshot{width:90px;height:auto;aspect-ratio:auto}
  .sp[data-layout="masonry"] .spgrid{display:block;column-count:2;column-gap:10px}
  .sp[data-layout="masonry"] .spcard{break-inside:avoid;margin-bottom:10px}
  .spcard{background:var(--ppanel);border:1px solid var(--pline);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .spshot{aspect-ratio:4/3;width:100%;object-fit:cover;display:block;background:var(--pline)}
  .sp[data-preview="contain"] .spshot{object-fit:contain}
  .sp[data-preview="framed"] .spshot{padding:6px;background:var(--ppanel);border-radius:9px}
  .sp[data-preview="grayscale"] .spshot{filter:grayscale(1)}
  .spb{padding:8px 9px}
  .spn{font-size:11px;font-weight:700;color:var(--pink)}
  .spbadge{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--pacc);margin-top:4px;display:inline-block}
  .sp[data-bg="glow"]{background-image:radial-gradient(420px 240px at 15% -10%, color-mix(in srgb, var(--pacc) 22%, transparent), transparent 60%)}
  .sp[data-bg="grid"]{background-image:linear-gradient(var(--pline) 1px,transparent 1px),linear-gradient(90deg,var(--pline) 1px,transparent 1px);background-size:26px 26px}
  .sp[data-bg="dots"]{background-image:radial-gradient(var(--pline) 1.1px,transparent 1.1px);background-size:16px 16px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">GRID · COMMAND CENTER<small>HK23 · UNIVERSE</small></div>
      <div class="creed" style="margin-top:8px">NOT GIVEN. TAKEN.</div>
    </div>
    <div style="text-align:right">
      <div class="sync" id="sync">cargando…</div>
      <div class="sync" id="cloud" style="margin-top:2px">● local</div>
      <div class="toolbar" style="margin-top:8px;justify-content:flex-end">
        <button class="btn ghost sm" onclick="refresh()">↻ Actualizar</button>
        <button class="btn ghost sm" onclick="exportAll()">↧ Exportar</button>
        <button class="btn ghost sm" onclick="document.getElementById('imp').click()">↥ Importar</button>
        <input id="imp" type="file" accept="application/json" class="hide" onchange="importAll(event)">
      </div>
    </div>
  </header>

  <nav id="nav">
    <button class="tab on" data-t="overview">Estado</button>
    <button class="tab" data-t="notes">Notas <span class="n" id="nNotes">0</span></button>
    <button class="tab" data-t="schedule">Agenda <span class="n" id="nSched">0</span></button>
    <button class="tab" data-t="brainstorm">Brainstorm <span class="n" id="nIdeas">0</span></button>
    <button class="tab" data-t="styles">Estilos</button>
  </nav>

  <section id="overview">
    <div class="kpis" id="kpis"></div>
    <div class="grid" id="worlds"></div>
    <div id="archiveWrap" style="margin-top:26px"></div>
  </section>

  <section id="notes" class="hide">
    <div class="sh"><h2>Notas</h2><button class="btn" onclick="toggleForm('noteForm')">+ Nota</button></div>
    <div class="form" id="noteForm">
      <div class="g">
        <div class="full"><label>Título</label><input id="nf_title" placeholder="Idea, recordatorio, decisión…"></div>
        <div class="full"><label>Nota</label><textarea id="nf_body" placeholder="Escribe aquí…"></textarea></div>
        <div><label>Mundo (opcional)</label><select id="nf_world"></select></div>
        <div><label>Etiqueta</label><input id="nf_tag" placeholder="growth, bug, idea…"></div>
      </div>
      <div class="right"><button class="btn ghost sm" onclick="toggleForm('noteForm')">Cancelar</button><button class="btn sm" onclick="addNote()">Guardar</button></div>
    </div>
    <div id="noteList"></div>
  </section>

  <section id="schedule" class="hide">
    <div class="sh"><h2>Ejecuciones programadas</h2><button class="btn" onclick="toggleForm('schForm')">+ Programar</button></div>
    <div class="form" id="schForm">
      <div class="g">
        <div class="full"><label>Qué se ejecuta</label><input id="sf_title" placeholder="Ej: refrescar grid, publicar post, deploy…"></div>
        <div><label>Fecha y hora</label><input id="sf_when" type="datetime-local"></div>
        <div><label>Mundo / target</label><select id="sf_world"></select></div>
        <div><label>Repetir</label><select id="sf_rep"><option value="none">Una vez</option><option value="daily">Diario</option><option value="weekly">Semanal</option><option value="monthly">Mensual</option></select></div>
        <div><label>Comando / acción (opcional)</label><input id="sf_cmd" placeholder="node scripts/grid-agent.mjs"></div>
        <div class="full"><label>Detalle</label><textarea id="sf_body" placeholder="Notas de la ejecución…"></textarea></div>
      </div>
      <div class="right"><button class="btn ghost sm" onclick="toggleForm('schForm')">Cancelar</button><button class="btn sm" onclick="addSched()">Programar</button></div>
    </div>
    <div id="schList"></div>
  </section>

  <section id="brainstorm" class="hide">
    <div class="sh">
      <h2>Brainstorm — propuestas & ideas</h2>
      <button class="btn" onclick="toggleForm('ideaForm')">+ Idea</button>
    </div>
    <div class="form" id="ideaForm">
      <div class="g">
        <div class="full"><label>Título de la idea</label><input id="if_title" placeholder="Propuesta, hipótesis, mejora…"></div>
        <div class="full"><label>Descripción</label><textarea id="if_body" placeholder="¿Qué es? ¿Por qué? ¿Cómo se complementa con otra idea o mundo?"></textarea></div>
        <div><label>Mundo relacionado</label><select id="if_world"></select></div>
        <div><label>Etiquetas (coma)</label><input id="if_tags" placeholder="growth, producto, monetización"></div>
        <div class="full"><label>Complementa a (idea existente)</label><select id="if_link"></select></div>
      </div>
      <div class="right"><button class="btn ghost sm" onclick="toggleForm('ideaForm')">Cancelar</button><button class="btn sm" onclick="addIdea()">Agregar</button></div>
    </div>
    <div class="board" id="board"></div>
  </section>

  <section id="styles" class="hide">
    <div class="sh"><h2>Estudio de Estilos</h2>
      <button class="btn" onclick="saveTheme()">✓ Aplicar a la grilla</button></div>
    <div class="stylewrap">
      <div class="stylecol">
        <div class="styleblock"><label>Skin · color</label><div class="chips" id="skinPicker"></div></div>
        <div class="styleblock"><label>Layout de grilla</label><div class="chips" id="layoutPicker"></div></div>
        <div class="styleblock"><label>Estilo de preview</label><div class="chips" id="previewPicker"></div></div>
        <div class="styleblock"><label>Fondo</label><div class="chips" id="bgPicker"></div></div>
        <div class="stylenote" id="styleSaved"></div>
      </div>
      <div class="stylecol grow">
        <label>Vista previa en vivo</label>
        <div class="sp" id="stylePreview"></div>
      </div>
    </div>
  </section>
</div>

<div class="modal" id="modal"><div class="sheet"><h3 id="mTitle"></h3><div id="mBody"></div>
  <div class="right" style="margin-top:16px"><button class="btn ghost sm" onclick="closeModal()">Cerrar</button></div></div></div>

<script>
const CLOUD={
  url:"https://qhklngvzdmwsbopbkiff.supabase.co",
  key:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoa2xuZ3Z6ZG13c2JvcGJraWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTEwOTYsImV4cCI6MjA5NzM2NzA5Nn0.ttdBrxCF6Wl6I8yKOICfTq7WyPylMmSmdKGUb176BCs"
};
const ROW="hk23";

const KEY="grid_command_v1";
const COLS=[["proposal","Propuestas"],["exploring","Explorando"],["approved","Aprobadas"],["shipped","Lanzadas"]];
let DB=load(), GRID={worlds:[],generatedAt:null};
function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}
function seed(){return{notes:[],schedules:[],ideas:[],archived:[],theme:{skin:"vice-gold",layout:"cards",preview:"cover",bg:"solid"}}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));paintCounts();pushCloud()}

function cloudOn(){return !!(CLOUD.url&&CLOUD.key)}
function cloudHdr(){return{apikey:CLOUD.key,Authorization:"Bearer "+CLOUD.key,"Content-Type":"application/json"}}
async function pullCloud(){
  if(!cloudOn())return;
  try{
    const r=await fetch(`${CLOUD.url}/rest/v1/grid_command?id=eq.${ROW}&select=data`,{headers:cloudHdr(),cache:"no-store"});
    if(!r.ok)return setCloudState("error");
    const rows=await r.json();
    if(rows[0]&&rows[0].data){DB=Object.assign(seed(),rows[0].data);localStorage.setItem(KEY,JSON.stringify(DB));renderAll();}
    setCloudState("ok");
  }catch(e){setCloudState("error");}
}
let pushT;
function pushCloud(){
  if(!cloudOn())return;
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{
    try{
      const r=await fetch(`${CLOUD.url}/rest/v1/grid_command?id=eq.${ROW}`,{method:"PATCH",
        headers:Object.assign(cloudHdr(),{Prefer:"return=minimal"}),
        body:JSON.stringify({data:DB,updated_at:new Date().toISOString()})});
      setCloudState(r.ok?"ok":"error");
    }catch(e){setCloudState("error");}
  },700);
}
function setCloudState(s){
  const el=document.getElementById("cloud");if(!el)return;
  if(!cloudOn()){el.textContent="● local";el.style.color="var(--mut2)";return;}
  el.textContent=s==="ok"?"● nube":"● nube (error)";
  el.style.color=s==="ok"?"var(--live)":"var(--down)";
}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt=d=>new Date(d).toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});

async function refresh(){
  try{
    const r=await fetch("./grid.json",{cache:"no-store"});
    if(r.ok) GRID=await r.json();
  }catch(e){}
  paintOverview(); fillWorldSelects(); paintSync();
}
function paintSync(){
  const el=document.getElementById("sync");
  if(GRID.generatedAt){
    el.innerHTML=`agente · última corrida <b>${fmt(GRID.generatedAt)}</b>`;
  }else{el.textContent="grid.json no encontrado (modo local)";}
}
function isArch(id){return (DB.archived||[]).includes(id);}
function archiveWorld(id){DB.archived=DB.archived||[];if(!DB.archived.includes(id))DB.archived.push(id);save();paintOverview();}
function restoreWorld(id){DB.archived=(DB.archived||[]).filter(x=>x!==id);save();paintOverview();}
function worldCard(x,archived){
  const st=x.status||"local";const nNotes=DB.notes.filter(n=>n.world===x.id).length;
  return `<div class="card">
    ${x.preview?`<img class="shot" loading="lazy" src="${esc(x.preview)}" alt="">`:`<div class="shot"></div>`}
    <div class="b">
      <div class="nm">${esc(x.name)}</div>
      <div class="ds">${esc(x.description||"")}</div>
      <div class="ft"><span class="badge ${st}">${st}</span>
        <span class="mini">${x.lastPush?("push "+fmt(x.lastPush)):""}</span></div>
      <div class="ft" style="margin-top:8px">
        ${archived
          ? `<span class="noteln" onclick="restoreWorld('${x.id}')">↩ restaurar</span>`
          : `<span class="noteln" onclick="quickNote('${x.id}')">+ nota${nNotes?` · ${nNotes}`:""}</span><span class="noteln" style="color:var(--mut2)" onclick="archiveWorld('${x.id}')">▢ archivar</span>`}
      </div>
    </div></div>`;
}
function paintOverview(){
  const all=GRID.worlds||[];
  const active=all.filter(x=>!isArch(x.id));
  const arch=all.filter(x=>isArch(x.id));
  const by=s=>active.filter(x=>(x.status||"local")===s).length;
  const k=[["ACTIVOS",active.length,""],["LIVE",by("live"),"live"],["LOCAL",by("local"),"local"],
    ["ARCHIVADOS",arch.length,""],["AGENDA",DB.schedules.filter(s=>!s.done).length,""]];
  document.getElementById("kpis").innerHTML=k.map(([l,v,c])=>
    `<div class="kpi"><div class="v ${c}">${v}</div><div class="l">${l}</div></div>`).join("");
  document.getElementById("worlds").innerHTML = active.length? active.map(x=>worldCard(x,false)).join("") : `<div class="empty">Sin mundos activos.</div>`;
  document.getElementById("archiveWrap").innerHTML = arch.length
    ? `<div class="sh" style="margin:0 0 14px"><h2 style="font-size:15px;color:var(--mut)">Archivo · ${arch.length}</h2></div><div class="grid">${arch.map(x=>worldCard(x,true)).join("")}</div>`
    : "";
}

function fillWorldSelects(){
  const opts=`<option value="">— ninguno —</option>`+(GRID.worlds||[]).map(w=>`<option value="${w.id}">${esc(w.name)}</option>`).join("");
  ["nf_world","sf_world","if_world"].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=opts;});
  const il=document.getElementById("if_link");
  if(il)il.innerHTML=`<option value="">— ninguna —</option>`+DB.ideas.map(i=>`<option value="${i.id}">${esc(i.title)}</option>`).join("");
}

function quickNote(world){switchTab("notes");toggleForm("noteForm",true);document.getElementById("nf_world").value=world;document.getElementById("nf_title").focus();}
function addNote(){
  const t=document.getElementById("nf_title").value.trim();
  const b=document.getElementById("nf_body").value.trim();
  if(!t&&!b)return;
  DB.notes.unshift({id:uid(),title:t||"(sin título)",body:b,world:document.getElementById("nf_world").value,
    tag:document.getElementById("nf_tag").value.trim(),at:Date.now()});
  save();["nf_title","nf_body","nf_tag"].forEach(i=>document.getElementById(i).value="");
  toggleForm("noteForm",false);paintNotes();
}
function delNote(id){DB.notes=DB.notes.filter(n=>n.id!==id);save();paintNotes();}
function worldName(id){const w=(GRID.worlds||[]).find(x=>x.id===id);return w?w.name:id;}
function paintNotes(){
  const el=document.getElementById("noteList");
  el.innerHTML=DB.notes.length?DB.notes.map(n=>`<div class="row"><div class="top">
    <div><div class="ttl">${esc(n.title)}</div>
      <div class="meta">${fmt(n.at)}${n.world?` · ${esc(worldName(n.world))}`:""}${n.tag?` · #${esc(n.tag)}`:""}</div></div>
    <div class="acts"><button class="x" onclick="delNote('${n.id}')">✕</button></div></div>
    ${n.body?`<div class="body">${esc(n.body)}</div>`:""}</div>`).join("")
    :`<div class="empty">Sin notas todavía.</div>`;
}

function addSched(){
  const t=document.getElementById("sf_title").value.trim();
  const when=document.getElementById("sf_when").value;
  if(!t||!when){alert("Falta título o fecha");return;}
  DB.schedules.push({id:uid(),title:t,when:new Date(when).getTime(),world:document.getElementById("sf_world").value,
    repeat:document.getElementById("sf_rep").value,cmd:document.getElementById("sf_cmd").value.trim(),
    body:document.getElementById("sf_body").value.trim(),done:false});
  save();["sf_title","sf_cmd","sf_body"].forEach(i=>document.getElementById(i).value="");
  toggleForm("schForm",false);paintSched();
}
function delSched(id){DB.schedules=DB.schedules.filter(s=>s.id!==id);save();paintSched();}
function toggleDone(id){const s=DB.schedules.find(x=>x.id===id);if(s)s.done=!s.done;save();paintSched();}
function countdown(ts){
  const d=ts-Date.now();const day=864e5;
  if(d<0)return["vencido","over"];
  if(d<36e5)return[Math.round(d/6e4)+" min","soon"];
  if(d<day)return[Math.round(d/36e5)+" h","soon"];
  return[Math.round(d/day)+" d","future"];
}
function paintSched(){
  const el=document.getElementById("schList");
  const list=[...DB.schedules].sort((a,b)=>a.when-b.when);
  el.innerHTML=list.length?list.map(s=>{
    const[c,cls]=countdown(s.when);
    return `<div class="row ${s.done?"done":""}"><div class="top">
      <div><div class="ttl">${esc(s.title)} ${s.repeat!=="none"?`<span class="tag">↻ ${s.repeat}</span>`:""}</div>
        <div class="meta">${fmt(s.when)}${s.world?` · ${esc(worldName(s.world))}`:""}${s.cmd?` · <code>${esc(s.cmd)}</code>`:""}</div></div>
      <div class="acts"><span class="count ${cls}">${s.done?"hecho":c}</span>
        <button class="btn ghost sm" onclick="toggleDone('${s.id}')">${s.done?"↺":"✓"}</button>
        <button class="x" onclick="delSched('${s.id}')">✕</button></div></div>
      ${s.body?`<div class="body">${esc(s.body)}</div>`:""}</div>`;
  }).join(""):`<div class="empty">Sin ejecuciones programadas.</div>`;
}

function addIdea(){
  const t=document.getElementById("if_title").value.trim();if(!t)return;
  DB.ideas.unshift({id:uid(),title:t,body:document.getElementById("if_body").value.trim(),
    world:document.getElementById("if_world").value,
    tags:document.getElementById("if_tags").value.split(",").map(x=>x.trim()).filter(Boolean),
    link:document.getElementById("if_link").value,status:"proposal",at:Date.now()});
  save();["if_title","if_body","if_tags"].forEach(i=>document.getElementById(i).value="");
  toggleForm("ideaForm",false);fillWorldSelects();paintBoard();
}
function delIdea(id){DB.ideas=DB.ideas.filter(i=>i.id!==id);save();fillWorldSelects();paintBoard();}
function moveIdea(id,dir){
  const i=DB.ideas.find(x=>x.id===id);if(!i)return;
  const order=COLS.map(c=>c[0]);let idx=order.indexOf(i.status)+dir;
  idx=Math.max(0,Math.min(order.length-1,idx));i.status=order[idx];save();paintBoard();
}
function ideaTitle(id){const i=DB.ideas.find(x=>x.id===id);return i?i.title:"";}
function paintBoard(){
  document.getElementById("board").innerHTML=COLS.map(([key,label])=>{
    const items=DB.ideas.filter(i=>(i.status||"proposal")===key);
    return `<div class="col"><h3>${label}<span>${items.length}</span></h3>
      ${items.map(i=>`<div class="idea">
        <div class="it">${esc(i.title)}</div>
        ${i.body?`<div class="ib">${esc(i.body)}</div>`:""}
        ${i.world?`<div class="link">◆ ${esc(worldName(i.world))}</div>`:""}
        ${i.link?`<div class="link">↳ complementa: ${esc(ideaTitle(i.link))}</div>`:""}
        ${i.tags&&i.tags.length?`<div class="tags">${i.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`:""}
        <div class="mv"><button onclick="moveIdea('${i.id}',-1)">◀</button>
          <button onclick="moveIdea('${i.id}',1)">▶</button>
          <button onclick="delIdea('${i.id}')" style="margin-left:auto">✕</button></div>
      </div>`).join("")||`<div class="empty">—</div>`}</div>`;
  }).join("");
}

function download(name,obj){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();
}
function exportAll(){
  download("grid-command-export.json",{exportedAt:new Date().toISOString(),...DB});
  download("schedules.json",{schedules:DB.schedules.filter(s=>!s.done).map(s=>({
    title:s.title,when:new Date(s.when).toISOString(),repeat:s.repeat,cmd:s.cmd,world:s.world}))});
}
function importAll(ev){
  const f=ev.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    DB.notes=d.notes||DB.notes;DB.schedules=d.schedules||DB.schedules;DB.ideas=d.ideas||DB.ideas;DB.archived=d.archived||DB.archived;DB.theme=d.theme||DB.theme;
    save();renderAll();alert("Importado.");}catch(e){alert("Archivo inválido");}};
  rd.readAsText(f);ev.target.value="";
}

function toggleForm(id,force){const e=document.getElementById(id);const on=force!==undefined?force:!e.classList.contains("open");e.classList.toggle("open",on);}
function switchTab(t){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
  ["overview","notes","schedule","brainstorm","styles"].forEach(s=>document.getElementById(s).classList.toggle("hide",s!==t));
}

const SKINS=[["vice-gold","Vice Gold","#d4af37"],["neon","Neon","#00e5ff"],["mono","Mono","#ffffff"],["light","Light","#a9801a"],["blood","Blood","#ff3b3b"],["cyber","Cyber","#39ff14"]];
const LAYOUTS=[["cards","Cards"],["compact","Compacto"],["list","Lista"],["masonry","Mosaico"]];
const PREVIEWS=[["cover","Cubrir"],["contain","Contener"],["framed","Marco"],["grayscale","B/N → color"]];
const BGS=[["solid","Sólido"],["glow","Glow"],["grid","Cuadrícula"],["dots","Puntos"]];
function theme(){ if(!DB.theme)DB.theme={skin:"vice-gold",layout:"cards",preview:"cover",bg:"solid"}; if(!DB.theme.bg)DB.theme.bg="solid"; return DB.theme; }
function renderStyles(){
  const t=theme();
  const chip=(arr,key,sw)=>arr.map(([v,l,c])=>`<button class="chip ${t[key]===v?"on":""}" onclick="setStyle('${key}','${v}')">${sw&&c?`<span class="sw" style="background:${c}"></span>`:""}${l}</button>`).join("");
  document.getElementById("skinPicker").innerHTML=chip(SKINS,"skin",true);
  document.getElementById("layoutPicker").innerHTML=chip(LAYOUTS,"layout");
  document.getElementById("previewPicker").innerHTML=chip(PREVIEWS,"preview");
  document.getElementById("bgPicker").innerHTML=chip(BGS,"bg");
  const sp=document.getElementById("stylePreview");
  sp.dataset.skin=t.skin;sp.dataset.layout=t.layout;sp.dataset.preview=t.preview;sp.dataset.bg=t.bg;
  const ws=(GRID.worlds||[]).slice(0,6);
  sp.innerHTML=`<div class="spgrid">${ws.map(w=>`<div class="spcard">
    ${w.preview?`<img class="spshot" src="${esc(w.preview)}" alt="">`:`<div class="spshot"></div>`}
    <div class="spb"><div class="spn">${esc(w.name)}</div><div class="spbadge">${w.status||"local"}</div></div></div>`).join("")||'<div class="empty">Sin mundos para previsualizar.</div>'}</div>`;
}
function setStyle(key,val){theme()[key]=val;save();renderStyles();}
function saveTheme(){save();const e=document.getElementById("styleSaved");e.textContent="✓ Aplicado. La grilla pública toma el estilo al recargar.";setTimeout(()=>e.textContent="",4000);}
document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest(".tab");if(b)switchTab(b.dataset.t);});
function paintCounts(){
  document.getElementById("nNotes").textContent=DB.notes.length;
  document.getElementById("nSched").textContent=DB.schedules.filter(s=>!s.done).length;
  document.getElementById("nIdeas").textContent=DB.ideas.length;
}
function closeModal(){document.getElementById("modal").classList.remove("open");}
function renderAll(){paintOverview();paintNotes();paintSched();paintBoard();fillWorldSelects();paintCounts();renderStyles();}

renderAll();refresh();setCloudState("ok");pullCloud();
setInterval(refresh,60000);
setInterval(pullCloud,45000);
setInterval(()=>{if(!document.getElementById("schedule").classList.contains("hide"))paintSched();},30000);
</script>
</body>
</html>
