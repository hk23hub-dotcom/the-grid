<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HK23 — THE GRID</title>
<meta name="description" content="Every world HK23 is building — live previews, one tap to enter." />
<meta property="og:title" content="HK23 — THE GRID" />
<meta property="og:description" content="Every project, one grid. Live previews. Enter any world." />
<style>
  :root{
    --bg:#08080a; --panel:#101014; --line:#1d1d22;
    --ink:#f4f4f5; --mut:#8a8a92; --gold:#d4af37; --live:#3ecf8e; --idle:#6b7280;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:42px 22px 80px}
  .eyebrow{letter-spacing:.32em;font-size:12px;color:var(--mut);text-transform:uppercase}
  .back{color:var(--mut);font-size:13px}
  .back:hover{color:var(--ink)}
  h1{font-size:clamp(42px,9vw,86px);font-weight:800;letter-spacing:-.02em;margin:.18em 0 .1em;line-height:.95}
  .lede{color:var(--mut);max-width:640px;font-size:17px}
  .lede b{color:var(--ink);font-weight:600}
  .creed{display:inline-block;margin-top:18px;color:var(--gold);
    letter-spacing:.18em;font-weight:700;font-size:13px;text-transform:uppercase}
  .meta{margin:30px 0 14px;display:flex;gap:18px;align-items:center;color:var(--mut);font-size:12.5px;
    border-top:1px solid var(--line);padding-top:18px;flex-wrap:wrap}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--live);display:inline-block;margin-right:6px;vertical-align:middle}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    display:flex;flex-direction:column;transition:transform .18s ease,border-color .18s ease;position:relative}
  .card:hover{transform:translateY(-4px);border-color:#33333c}
  .shot{aspect-ratio:4/3;width:100%;object-fit:cover;background:#0d0d10;display:block}
  .body{padding:16px 17px 18px}
  .name{font-weight:700;letter-spacing:.01em;font-size:16px}
  .desc{color:var(--mut);font-size:13.5px;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
  .badge{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:999px;
    border:1px solid var(--line);color:var(--mut)}
  .badge.live{color:var(--live);border-color:#1c3b2e}
  .badge.local{color:var(--gold);border-color:#3a3014}
  .badge.building{color:#e0b341;border-color:#3a3014}
  .badge.down{color:#ef5b5b;border-color:#3a1c1c}
  .enter{font-size:12.5px;color:var(--mut)}
  .card:hover .enter{color:var(--ink)}
  .featstar{position:absolute;top:12px;left:12px;background:var(--gold);color:#1a1405;
    font-size:10px;font-weight:800;letter-spacing:.1em;padding:4px 8px;border-radius:6px}
  footer{margin-top:60px;color:var(--mut);font-size:12.5px;text-align:center;letter-spacing:.04em}

  /* ===== SKINS (color themes) ===== */
  body[data-skin="neon"]{--bg:#05060a;--panel:#0b0e16;--line:#16202e;--ink:#eaf6ff;--mut:#7d93ad;--gold:#00e5ff;--live:#39ff14;}
  body[data-skin="mono"]{--bg:#000;--panel:#0c0c0c;--line:#242424;--ink:#fff;--mut:#9a9a9a;--gold:#ffffff;--live:#ffffff;}
  body[data-skin="light"]{--bg:#faf9f7;--panel:#ffffff;--line:#e7e4dd;--ink:#18181b;--mut:#6b6b73;--gold:#a9801a;--live:#1a9d63;}
  body[data-skin="blood"]{--bg:#0a0606;--panel:#150c0c;--line:#2a1414;--ink:#f6ecec;--mut:#a98a8a;--gold:#ff3b3b;--live:#ff7a3b;}
  body[data-skin="cyber"]{--bg:#050a06;--panel:#0a140a;--line:#15301a;--ink:#d8ffe0;--mut:#6fae7f;--gold:#39ff14;--live:#39ff14;
    font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;}

  /* ===== LAYOUTS ===== */
  .grid[data-layout="compact"]{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .grid[data-layout="compact"] .body{padding:11px 12px 13px}
  .grid[data-layout="compact"] .name{font-size:14px}
  .grid[data-layout="list"]{grid-template-columns:1fr;gap:12px}
  .grid[data-layout="list"] .card{flex-direction:row;align-items:stretch}
  .grid[data-layout="list"] .shot{width:230px;flex-shrink:0;aspect-ratio:auto;height:auto;min-height:130px}
  .grid[data-layout="list"] .body{flex:1}
  .grid[data-layout="masonry"]{display:block;column-count:3;column-gap:18px}
  .grid[data-layout="masonry"] .card{break-inside:avoid;margin-bottom:18px}
  @media(max-width:820px){.grid[data-layout="masonry"]{column-count:2}.grid[data-layout="list"] .shot{width:140px}}

  /* ===== PREVIEW STYLES ===== */
  .grid[data-preview="contain"] .shot{object-fit:contain;background:#0d0d10}
  .grid[data-preview="framed"] .shot{padding:10px;background:var(--panel);border-radius:14px}
  .grid[data-preview="grayscale"] .shot{filter:grayscale(1) contrast(1.05);transition:filter .25s ease}
  .grid[data-preview="grayscale"] .card:hover .shot{filter:none}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="https://hk23universe.vercel.app/cosmos.html">← back to the cosmos</a>
  <a class="back" href="./command.html" style="float:right">command center →</a>
  <div class="eyebrow" style="margin-top:18px">HK23 · UNIVERSE</div>
  <h1>THE GRID</h1>
  <p class="lede">Every world I'm building — <b>live previews</b>, one tap to enter. The cosmos shows the orbit; the grid lets you walk in.</p>
  <div class="creed" id="creed">NOT GIVEN. TAKEN.</div>

  <div class="meta">
    <span><span class="dot"></span><b id="count">0</b>&nbsp;worlds</span>
    <span id="updated"></span>
    <span>auto-maintained by the grid agent</span>
  </div>

  <div class="grid" id="grid"></div>

  <footer>HK23 · THE GRID — self-updating. Worlds refresh every 6h.</footer>
</div>

<script>
// Embedded fallback so the page renders even from file:// (no fetch).
// When deployed, live grid.json overrides this so the agent's updates flow through.
const FALLBACK = {"generatedAt":"2026-06-26T06:30:00.000Z","tagline":"NOT GIVEN. TAKEN.","featured":"chile-goldmine","worlds":[
{"id":"chile-goldmine","name":"CHILE GOLDMINE","description":"Turn the map collection into sales and funnel followers to the La Iglesia Goldmine landing page.","url":"https://hk23universe.vercel.app/chile-goldmine","status":"local","preview":"./previews/chile-goldmine.jpg"},
{"id":"vicegolfer-command-center","name":"VICEGOLFER COMMAND CENTER","description":"Capture archive — raw intel accumulating before the final dashboard.","url":"https://hk23universe.vercel.app/vicegolfer-command-center","status":"local","preview":"./previews/vicegolfer-command-center.jpg"},
{"id":"cryptovice-honeyscam","name":"CRYPTOVICE HONEYSCAM","description":"A world in progress.","url":"https://hk23universe.vercel.app/cryptovice-honeyscam","status":"local","preview":"./previews/cryptovice-honeyscam.jpg"},
{"id":"uno-al-dia-soprole","name":"UNO AL DIA SOPROLE","description":"Arma tu Mundo — creative concepts & skins kit.","url":"https://hk23universe.vercel.app/uno-al-dia-soprole","status":"local","preview":"./previews/uno-al-dia-soprole.jpg"},
{"id":"affiliate-growth-agent","name":"AFFILIATE GROWTH AGENT","description":"Pre-launch growth system — content engine, funnels, automation stack.","url":"https://hk23universe.vercel.app/affiliate-growth-agent","status":"local","preview":"./previews/affiliate-growth-agent.jpg"},
{"id":"atlas-x","name":"ATLAS X","description":"Adaptive Thinking, Learning & Action System.","url":"https://hk23universe.vercel.app/atlas-x","status":"local","preview":"./previews/atlas-x.jpg"},
{"id":"hk23-vice-os-ecosystem","name":"HK23 VICE OS ECOSYSTEM","description":"Get all 7 agents running · 15 min setup.","url":"https://hk23universe.vercel.app/hk23-vice-os-ecosystem","status":"local","preview":"./previews/hk23-vice-os-ecosystem.jpg"},
{"id":"how-to-use-claude","name":"HOW TO USE CLAUDE","description":"Claude Cowork project instructions & launch assets.","url":"https://hk23universe.vercel.app/how-to-use-claude","status":"local","preview":"./previews/how-to-use-claude.jpg"}
]};

const STATUS_LABEL = {live:"live",local:"local",building:"building",idle:"idle",down:"down"};

function render(data){
  document.getElementById("creed").textContent = data.tagline || "NOT GIVEN. TAKEN.";
  document.getElementById("count").textContent = data.worlds.length;
  if(data.generatedAt){
    const d = new Date(data.generatedAt);
    document.getElementById("updated").textContent =
      "updated " + d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
  }
  const grid = document.getElementById("grid");
  grid.innerHTML = data.worlds.map(w=>{
    const st = (w.status||"local");
    const shot = w.preview
      ? `<img class="shot" loading="lazy" src="${w.preview}" alt="${w.name}">`
      : `<div class="shot"></div>`;
    const feat = (w.id===data.featured) ? `<span class="featstar">FEATURED</span>` : "";
    return `<a class="card" href="${w.url}" target="_blank" rel="noopener">
      ${feat}${shot}
      <div class="body">
        <div class="name">${w.name}</div>
        <div class="desc">${w.description||""}</div>
        <div class="row">
          <span class="badge ${st}">${STATUS_LABEL[st]||st}</span>
          <span class="enter">enter →</span>
        </div>
      </div>
    </a>`;
  }).join("");
}

// ===== THEME (skin / layout / preview) — set from the Command Center =====
const SUPA={url:"https://qhklngvzdmwsbopbkiff.supabase.co",key:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoa2xuZ3Z6ZG13c2JvcGJraWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTEwOTYsImV4cCI6MjA5NzM2NzA5Nn0.ttdBrxCF6Wl6I8yKOICfTq7WyPylMmSmdKGUb176BCs"};
function applyTheme(t){
  t=t||{};
  document.body.dataset.skin=t.skin||"vice-gold";
  const g=document.getElementById("grid");
  g.dataset.layout=t.layout||"cards";
  g.dataset.preview=t.preview||"cover";
}
applyTheme();   // default until cloud responds
fetch(`${SUPA.url}/rest/v1/grid_command?id=eq.hk23&select=data`,{headers:{apikey:SUPA.key,Authorization:"Bearer "+SUPA.key},cache:"no-store"})
  .then(r=>r.ok?r.json():[]).then(rows=>applyTheme(rows[0]&&rows[0].data&&rows[0].data.theme)).catch(()=>{});

// Prefer live grid.json (so the agent's updates appear); fall back to embedded.
fetch("./grid.json",{cache:"no-store"})
  .then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(render)
  .catch(()=>render(FALLBACK));
</script>
</body>
</html>
